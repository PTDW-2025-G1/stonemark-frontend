<div class="max-w-6xl mx-auto my-10 px-4">
  <!-- Title / subtitle -->
  <app-suggest-title [name]="originalData.name"></app-suggest-title>
  <!-- Progress titles + bar -->
  <app-suggest-progress-bar [progress]="progressPercent()"></app-suggest-progress-bar>

  <!-- Card area -->
  <div class="bg-surface rounded-2xl p-6 shadow-sm">
    @if (currentStep === 1) {
      <app-suggest-step1
        [(sections)]="sections"
        (next)="next()"
        (cancel)="cancel()"
      />
    }

    @if (currentStep === 2) {
      <app-suggest-step2
        [sections]="sections"
        [(editedData)]="editedData"
        [mapUrl]="mapUrl"
        [mapLoading]="mapLoading"
        [mapLoadError]="mapLoadError"
        (mapLoaded)="mapLoading = false"
        [step2Valid]="step2Valid()"
        (updateMap)="updateMapPreview()"
        (openExternalMap)="openExternalMap()"
        (openDirections)="openDirections()"
        (prev)="prev()"
        (next)="next()"
      />
    }

    @if (currentStep === 3) {
      <app-suggest-step3
        [sections]="sections"
        [originalData]="originalData"
        [(editedData)]="editedData"
        [mapUrl]="mapUrl"
        [changed]="changed.bind(this)"
        (openExternalMap)="openExternalMap()"
        (openDirections)="openDirections()"
        (prev)="prev()"
        (submit)="submit()"
      />
    }

  </div>
</div>

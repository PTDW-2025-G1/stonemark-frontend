<p-toast></p-toast>
<p-confirmDialog></p-confirmDialog>
<p-card>
  <ng-template pTemplate="title">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <span>Contacts</span>
      <button pButton type="button" label="Add Contact" icon="pi pi-plus" (click)="showAddDialog()" style="min-width: 160px; height: 2.5rem; font-size: 1.1rem;"></button>
    </div>
  </ng-template>
  <p-table [value]="contacts" responsiveLayout="scroll" style="margin-top: 1.5rem;">
    <ng-template pTemplate="header">
      <tr>
        <th style="padding: 0.75rem 1rem;">Type</th>
        <th style="padding: 0.75rem 1rem;">Value</th>
        <th style="padding: 0.75rem 1rem;">Primary</th>
        <th style="padding: 0.75rem 1rem;">Verified</th>
        <th style="padding: 0.75rem 1rem;">Actions</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-contact>
      <tr>
        <td style="padding: 0.75rem 1rem;">{{contact.type}}</td>
        <td style="padding: 0.75rem 1rem;">{{contact.value}}</td>
        <td style="padding: 0.75rem 1rem;"><i class="pi" [ngClass]="{'pi-check-circle text-green-500': contact.primary, 'pi-times-circle text-red-500': !contact.primary}"></i></td>
        <td style="padding: 0.75rem 1rem;"><i class="pi" [ngClass]="{'pi-check-circle text-green-500': contact.verified, 'pi-times-circle text-red-500': !contact.verified}"></i></td>
        <td style="padding: 0.75rem 1rem;">
          <button pButton type="button" icon="pi pi-pencil" class="p-button-rounded p-button-success" style="margin-right: 1rem;" (click)="showEditDialog(contact)"></button>
          <button pButton type="button" icon="pi pi-trash" class="p-button-rounded p-button-warning" (click)="deleteContact(contact)"></button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

<p-dialog header="Contact Details" [(visible)]="displayDialog" [modal]="true" [style]="{width: '50vw'}">
  <div class="p-fluid">
    <div class="p-field mb-2" style="display: flex; align-items: center; gap: 2rem; max-width: 400px; margin-bottom: 1.5rem;">
      <label for="type" style="font-weight: 500; min-width: 120px;">Type</label>
      <p-select id="type" [options]="contactTypes" [(ngModel)]="selectedContact.type" optionLabel="label" optionValue="value" style="width: 220px;"></p-select>
    </div>
    <div class="p-field mb-2" style="display: flex; align-items: center; gap: 2rem; max-width: 400px; margin-bottom: 1.5rem;">
      <label for="value" style="font-weight: 500; min-width: 120px;">Value</label>
      <input id="value" type="text" pInputText [(ngModel)]="selectedContact.value" style="width: 220px;">
    </div>
    <div class="p-field-checkbox mb-4" style="display: flex; align-items: center; gap: 2rem; max-width: 400px; margin-bottom: 1.5rem;">
      <label for="primary" style="margin-bottom: 0; font-weight: 500; min-width: 120px;">Primary</label>
      <p-toggleSwitch [(ngModel)]="selectedContact.primary"></p-toggleSwitch>
    </div>
    <div class="p-field-checkbox" style="display: flex; align-items: center; gap: 2rem; max-width: 400px; margin-bottom: 1.5rem;">
      <label for="verified" style="margin-bottom: 0; font-weight: 500; min-width: 120px;">Verified</label>
      <p-toggleSwitch [(ngModel)]="selectedContact.verified"></p-toggleSwitch>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <button pButton type="button" label="Cancel" icon="pi pi-times" (click)="displayDialog=false" class="p-button-text"></button>
    <button pButton type="button" label="Save" icon="pi pi-check" (click)="saveContact()"></button>
  </ng-template>
</p-dialog>

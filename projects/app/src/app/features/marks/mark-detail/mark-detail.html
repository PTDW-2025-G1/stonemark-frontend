<app-breadcrumb [items]="(breadcrumbItems$ | async) ?? []"></app-breadcrumb>

@if (loading) {
  <app-mark-detail-loading-state></app-mark-detail-loading-state>
}

@if (mark$ | async; as mark) {
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

    <app-mark-detail-header
      [mark]="mark"
      [occurrencesCount]="occurrencesCount"
      [monumentsCount]="uniqueMonumentsCount"
      [bookmarksCount]="bookmarksCount"
      [isBookmarked]="isBookmarked"
      (bookmarkToggled)="toggleBookmark()">
    </app-mark-detail-header>

    <!-- Filter -->
    <div class="flex items-center justify-end gap-3 mb-6">
      <label class="text-xs font-semibold text-text-muted uppercase tracking-wider">Filter by Monument ({{ monuments.length }})</label>
      <div class="w-64">
        <app-shared-select
          [options]="monuments"
          [selected]="selectedMonumentId"
          [label]="'All Monuments'"
          [searchable]="true"
          [optionLabelKey]="'name'"
          [optionValueKey]="'id'"
          (selectionChange)="onMonumentFilterChange($event)">
        </app-shared-select>
      </div>
      @if (selectedMonumentId) {
        <button
          (click)="onMonumentFilterChange('')"
          class="text-xs text-primary hover:text-primary/80 transition-colors font-medium flex items-center gap-1.5"
        >
          <i class="bi bi-x-circle"></i>
          <span>Clear filter</span>
        </button>
      }
    </div>

    <!-- Occurrences Grid -->
    <app-occurrences-grid
      [occurrences]="occurrences"
      (viewOccurrence)="viewOccurrence($event)"
      (viewMonument)="viewMonument($event)">
    </app-occurrences-grid>

    @if (!loading && occurrences.length === 0) {
      <app-mark-detail-empty-state></app-mark-detail-empty-state>
    }

    @if (!loading && occurrences.length > 0 && totalPages > 1) {
      <app-pagination
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    }

    <app-mark-detail-info-box></app-mark-detail-info-box>
  </div>
}

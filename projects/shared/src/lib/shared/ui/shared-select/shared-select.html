<div class="relative w-full">
  <button
    type="button"
    (click)="toggleDropdown()"
    class="w-full px-4 py-2.5 sm:py-3 bg-surface border-2 border-border rounded-xl flex items-center justify-between gap-3 group">
    <span class="truncate font-medium">{{ getSelectedLabel() }}</span>
    <i
      class="bi text-xs text-text-muted"
      [class.bi-chevron-up]="isDropdownOpen"
      [class.bi-chevron-down]="!isDropdownOpen"
      [class.rotate-180]="isDropdownOpen">
    </i>
  </button>

  <!-- Dropdown Menu -->
  @if (isDropdownOpen) {
    <div class="absolute top-full left-0 right-0 mt-2 bg-surface border-2 border-border rounded-xl shadow-2xl z-50 overflow-hidden animate-slide-down">
      @if (searchable && options.length > 8) {
        <div class="p-3 border-b border-border bg-surface-alt">
          <input
            type="text"
            [(ngModel)]="dropdownSearch"
            placeholder="Quick search..."
            class="w-full pl-3 pr-3 py-2 bg-surface border border-border rounded-lg text-sm"
            (click)="$event.stopPropagation()"
          />
        </div>
      }
      <div class="max-h-64 overflow-y-auto custom-scrollbar">
        <button
          type="button"
          (click)="selectOption('')"
          [class.bg-primary]="selected === ''"
          [class.text-white]="selected === ''"
          class="w-full px-4 py-3 text-left text-sm flex items-center gap-3 group">
          <i
            class="bi text-lg"
            [class.bi-check-circle-fill]="selected === ''"
            [class.bi-circle]="selected !== ''"
            [class.text-white]="selected === ''"
            [class.text-text-muted]="selected !== ''">
          </i>
          <span class="font-medium">{{ label }}</span>
        </button>
        @for (opt of getFilteredOptions(); track opt[optionValueKey]) {
          <button
            type="button"
            (click)="selectOption(opt[optionValueKey])"
            [class.bg-primary]="selected === opt[optionValueKey]"
            [class.text-white]="selected === opt[optionValueKey]"
            class="w-full px-4 py-3 text-left text-sm flex items-center gap-3 border-t border-border group">
            <i
              class="bi text-lg"
              [class.bi-check-circle-fill]="selected === opt[optionValueKey]"
              [class.bi-circle]="selected !== opt[optionValueKey]"
              [class.text-white]="selected === opt[optionValueKey]"
              [class.text-text-muted]="selected !== opt[optionValueKey]">
            </i>
            <span class="block truncate font-medium">{{ opt[optionLabelKey] }}</span>
          </button>
        }
        @if (getFilteredOptions().length === 0) {
          <div class="px-4 py-8 text-center text-text-muted">
            <i class="bi bi-search text-3xl mb-2 block opacity-50"></i>
            <p class="text-sm">No results found</p>
          </div>
        }
      </div>
    </div>
  }

  <!-- Backdrop -->
  @if (isDropdownOpen) {
    <div class="fixed inset-0 z-40" (click)="closeDropdown()"></div>
  }
</div>

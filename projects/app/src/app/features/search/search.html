<!-- Search Page Container -->
<div class="min-h-screen">
  <app-search-header
    [type]="type"
    [title]="title"

    [districts]="(districts$ | async) ?? []"
    [municipalities]="(municipalities$ | async) ?? []"
    [parishes]="(parishes$ | async) ?? []"

    [selectedDistrictId]="selectedDistrictId"
    [selectedMunicipalityId]="selectedMunicipalityId"
    [selectedParishId]="selectedParishId"

    (search)="onSearch($event)"
    (districtChange)="onDistrictChange($event)"
    (municipalityChange)="onMunicipalityChange($event)"
    (parishChange)="onParishChange($event)">
  </app-search-header>
  <!-- Main Content -->
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-8 lg:py-12">
    <div class="flex flex-col lg:flex-row gap-6 lg:gap-8">
      <!-- Results Grid + Pagination -->
      <div class="flex flex-col items-center w-full">
        <app-search-results [items]="(items$ | async) ?? []" [type]="type"></app-search-results>
        <app-search-pagination
          [currentPage]="pagination.currentPage"
          [totalPages]="pagination.totalPages"
          (pageChange)="onPageChange($event)">
        </app-search-pagination>
      </div>
    </div>
  </div>
</div>

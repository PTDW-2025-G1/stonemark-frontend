<app-breadcrumb [items]="(breadcrumbItems$ | async) ?? []"></app-breadcrumb>

@if (occurrencesFacade.loading) {
  <app-mark-detail-loading-state></app-mark-detail-loading-state>
}

@if (mark$ | async; as mark) {
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 lg:py-12">

    <app-mark-detail-header
      [mark]="mark"
      [occurrencesCount]="occurrencesCount"
      [monumentsCount]="uniqueMonumentsCount"
      [bookmarksCount]="bookmarkFacade.count"
      [isBookmarked]="bookmarkFacade.isBookmarked"
      (bookmarkToggled)="toggleBookmark()"
      (reportClicked)="openReportModal()">
    </app-mark-detail-header>

    <app-filters
      [sortOrder]="occurrencesFacade.selectedSort === 'asc' ? 'asc' : 'desc'"
      [filterOptions]="monuments"
      [selectedFilterValue]="occurrencesFacade.selectedMonumentId"
      [filterLabel]="'Filter by Monument (' + monuments.length + ')'"
      [filterIconHtml]="monumentsIcon"
      [filterPlaceholder]="'All Monuments'"
      [optionLabelKey]="'name'"
      [optionValueKey]="'id'"
      (sortChange)="onSortChange($event)"
      (filterChange)="onMonumentFilterChange($event)">
    </app-filters>

    <app-occurrences-grid
      [occurrences]="occurrencesFacade.occurrences"
      (viewOccurrence)="viewOccurrence($event)"
      (viewMonument)="viewMonument($event)">
    </app-occurrences-grid>

    @if (!occurrencesFacade.loading && occurrencesFacade.occurrences.length === 0) {
      <app-mark-detail-empty-state></app-mark-detail-empty-state>
    }

    @if (!occurrencesFacade.loading && occurrencesFacade.occurrences.length > 0 && occurrencesFacade.pagination.totalPages > 1) {
      <app-pagination
        [currentPage]="occurrencesFacade.pagination.currentPage"
        [totalPages]="occurrencesFacade.pagination.totalPages"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    }
    <app-mark-detail-info-box></app-mark-detail-info-box>
  </div>
}

<app-report-modal
  [visible]="reportFacade.visible"
  [config]="reportFacade.config"
  [fieldErrors]="reportFacade.fieldErrors"
  (reportSubmit)="handleReportSubmit($event)"
  (close)="reportFacade.close()">
</app-report-modal>

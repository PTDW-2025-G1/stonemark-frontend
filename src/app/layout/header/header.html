<header class="bg-surface-alt shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">

      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="flex items-center space-x-2">
          <span class="text-2xl font-bold text-primary tracking-tight">
            StoneMark<span class="text-info">.</span>
          </span>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-8">
        @for (item of menuItems; track item.route) {
          <a
            [routerLink]="item.route"
            routerLinkActive="text-primary"
            class="text-text-muted hover:text-primary transition-colors duration-200 font-medium text-sm"
          >
            {{ item.label }}
          </a>
        }

        @if (authService.getAccessToken()){
          <button (click)="onLogout()" class="inline-block">
            <app-button variant="secondary">Logout</app-button>
          </button>
        } @else {
        <a routerLink="/login" class="inline-block">
         <app-button variant="secondary">Login</app-button>
        </a>
        }
      </nav>

      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button
          (click)="toggleMenu()"
          class="inline-flex items-center justify-center p-2 rounded-lg text-text-muted hover:text-primary hover:bg-surface-muted transition-colors duration-200"
          [attr.aria-expanded]="isMenuOpen"
        >
          <span class="sr-only">Toggle menu</span>

          @if (!isMenuOpen) {
            <i class="bi bi-list text-2xl"></i>
          } @else {
            <i class="bi bi-x-lg text-2xl"></i>
          }
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div
    class="md:hidden transition-all duration-300 ease-in-out overflow-hidden"
    [class.max-h-96]="isMenuOpen"
    [class.max-h-0]="!isMenuOpen"
    [class.opacity-100]="isMenuOpen"
    [class.opacity-0]="!isMenuOpen"
  >
    <div class="px-4 pt-2 pb-6 space-y-1 bg-surface rounded-b-2xl shadow-md">
      @for (item of menuItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="bg-surface-muted text-primary"
          (click)="closeMenu()"
          class="block px-4 py-3 rounded-lg text-text-muted hover:bg-surface-muted hover:text-primary transition-colors duration-200 font-medium"
        >
          {{ item.label }}
        </a>
      }

      <div class="pt-2">
        @if (authService.getAccessToken()){
          <button (click)="onLogout()" class="inline-block">
            <app-button variant="secondary">Logout</app-button>
          </button>
        } @else {
          <a routerLink="/login" class="w-full inline-block">
            <app-button variant="secondary" [fullWidth]="true">Login</app-button>
          </a>
        }
      </div>
    </div>
  </div>
</header>

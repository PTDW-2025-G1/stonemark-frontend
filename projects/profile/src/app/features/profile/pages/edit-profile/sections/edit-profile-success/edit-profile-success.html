<!-- Header -->
<div class="text-center mb-8">
  <div class="inline-flex items-center justify-center w-20 h-20 bg-success/10 rounded-2xl mb-4 animate-bounce">
    <i class="bi bi-check-circle text-success text-4xl"></i>
  </div>
  <h2 class="text-3xl sm:text-4xl font-serif font-bold text-text mb-2">
    Profile Updated!
  </h2>
  <p class="text-text-muted">
    Your profile information has been successfully updated
  </p>
</div>

<!-- Success Card -->
<div class="bg-gradient-to-br from-surface-alt to-surface rounded-2xl border-2 border-border p-6 sm:p-8 shadow-xl mb-6">
  <div class="space-y-6">
    <!-- Updated Info Display -->
    <div class="flex items-start gap-4 p-4 bg-success/5 rounded-xl border border-success/20">
      <div class="w-10 h-10 bg-success/10 rounded-lg flex items-center justify-center flex-shrink-0">
        <i class="bi bi-person-check text-success text-xl"></i>
      </div>
      <div class="flex-1">
        <h3 class="font-semibold text-text mb-3">Updated Information</h3>
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-sm text-text-muted">Name:</span>
            <span class="text-sm font-semibold text-text">{{ updatedProfile.firstName }} {{ updatedProfile.lastName }}</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="p-4 bg-surface rounded-xl border border-border">
      <h4 class="font-semibold text-text text-sm mb-3 flex items-center gap-2">
        <i class="bi bi-lightning text-primary"></i>
        Quick Actions
      </h4>
      <div class="space-y-2">
        <a routerLink="/profile/contacts" class="flex items-center justify-between p-3 bg-surface-alt rounded-lg hover:bg-surface-muted transition-colors duration-300">
          <div class="flex items-center gap-2">
            <i class="bi bi-telephone text-info"></i>
            <span class="text-sm text-text">Change Contact Information</span>
          </div>
          <i class="bi bi-chevron-right text-text-muted text-xs"></i>
        </a>
        <a routerLink="/profile/change-password" class="flex items-center justify-between p-3 bg-surface-alt rounded-lg hover:bg-surface-muted transition-colors duration-300">
          <div class="flex items-center gap-2">
            <i class="bi bi-shield-lock text-warning"></i>
            <span class="text-sm text-text">Change Password</span>
          </div>
          <i class="bi bi-chevron-right text-text-muted text-xs"></i>
        </a>
      </div>
    </div>
  </div>
</div>

<!-- Action Buttons -->
<div class="space-y-3">
  <button
    (click)="onEditAgain()"
    class="w-full group relative overflow-hidden px-6 py-3.5 bg-primary text-white rounded-xl font-semibold hover:shadow-lg transition-all duration-300">
    <div class="absolute inset-0 bg-gradient-to-r from-primary/80 to-info/80 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    <span class="relative flex items-center justify-center gap-2">
      <i class="bi bi-pencil"></i>
      Edit Again
    </span>
  </button>

  <button
    (click)="onBackToProfile()"
    class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-surface-alt border-2 border-border text-text rounded-xl font-semibold hover:border-primary transition-all duration-300">
    <i class="bi bi-person"></i>
    Back to Profile
  </button>
</div>

<!-- Filters Sidebar -->
<aside class="w-full lg:w-64 flex-shrink-0">
  <div class="bg-gradient-to-br from-surface-alt to-surface rounded-2xl border border-border lg:p-6 lg:sticky lg:top-8 shadow-sm transition-all duration-300"
       [class.p-4]="isFiltersOpen"
       [class.p-3]="!isFiltersOpen">

    <div class="flex items-center justify-between"
         [class.mb-6]="isFiltersOpen"
         [class.mb-3]="!isFiltersOpen">
      <div class="flex items-center gap-2">
        <i class="bi bi-funnel-fill text-primary text-xl"></i>
        <h2 class="text-base sm:text-lg font-serif font-semibold">Filters</h2>
      </div>

      <!-- (for mobile) -->
      <button
        (click)="toggleFilters()"
        class="lg:hidden p-2 hover:bg-surface rounded-lg transition-colors">
        <i class="bi text-lg transition-transform duration-300"
           [class.bi-chevron-down]="!isFiltersOpen"
           [class.bi-chevron-up]="isFiltersOpen"></i>
      </button>
    </div>

    <!-- Filter: Location -->
    <div [class.hidden]="!isFiltersOpen" class="lg:block">
      @if (filters.location) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-pin-map-fill text-primary"></i>
            Location
          </h3>
          <div class="relative">
            <i class="bi bi-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none text-xs"></i>
            <select
              (change)="onFilterChange('location', $event)"
              class="w-full pl-3 pr-8 py-2 bg-surface border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer hover:border-primary transition-colors">
              <option value="">All Locations</option>
              <option value="lisboa">Lisboa</option>
              <option value="porto">Porto</option>
              <option value="coimbra">Coimbra</option>
              <option value="guimaraes">Guimarães</option>
            </select>
          </div>
        </div>
      }

      <!-- Filter: Monument (only for Marks) -->
      @if (filters.monument) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-building text-primary"></i>
            Monument
          </h3>
          <div class="relative">
            <i class="bi bi-chevron-down absolute right-3 top-1/2 -translate-y-1/2 text-text-muted pointer-events-none text-xs"></i>
            <select
              (change)="onFilterChange('monument', $event)"
              class="w-full pl-3 pr-8 py-2 bg-surface border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary appearance-none cursor-pointer hover:border-primary transition-colors">
              <option value="">All Monuments</option>
              <option value="castelo-guimaraes">Castelo de Guimarães</option>
              <option value="torre-belem">Torre de Belém</option>
              <option value="mosteiro-batalha">Mosteiro da Batalha</option>
            </select>
          </div>
        </div>
      }

      <!-- Filter: Artist -->
      @if (filters.artist) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-palette-fill text-primary"></i>
            Artist
          </h3>
          <div class="relative">
            <i class="bi bi-person-fill absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-sm"></i>
            <input
              type="text"
              placeholder="e.g. Maximiliano Alves"
              (input)="onFilterChange('artist', $event)"
              class="w-full pl-9 pr-3 py-2 bg-surface border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary hover:border-primary transition-colors"
            />
          </div>
        </div>
      }

      <!-- Filter: Material -->
      @if (filters.material) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-gem text-primary"></i>
            Material
          </h3>
          <div class="space-y-2 bg-surface rounded-lg p-3 border border-border">
            <label class="flex items-center gap-2 cursor-pointer group">
              <input
                type="checkbox"
                value="stone"
                (change)="onMaterialChange($event)"
                class="w-4 h-4 rounded border-border text-primary focus:ring-primary cursor-pointer">
              <span class="text-sm group-hover:text-primary transition-colors">Stone</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer group">
              <input
                type="checkbox"
                value="bronze"
                (change)="onMaterialChange($event)"
                class="w-4 h-4 rounded border-border text-primary focus:ring-primary cursor-pointer">
              <span class="text-sm group-hover:text-primary transition-colors">Bronze</span>
            </label>
            <label class="flex items-center gap-2 cursor-pointer group">
              <input
                type="checkbox"
                value="iron"
                (change)="onMaterialChange($event)"
                class="w-4 h-4 rounded border-border text-primary focus:ring-primary cursor-pointer">
              <span class="text-sm group-hover:text-primary transition-colors">Iron</span>
            </label>
          </div>
        </div>
      }

      <!-- Filter: Architect -->
      @if (filters.architect) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-rulers text-primary"></i>
            Architect
          </h3>
          <div class="relative">
            <i class="bi bi-person-fill absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-sm"></i>
            <input
              type="text"
              placeholder="e.g. Raul Lino"
              (input)="onFilterChange('architect', $event)"
              class="w-full pl-9 pr-3 py-2 bg-surface border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary hover:border-primary transition-colors"
            />
          </div>
        </div>
      }

      <!-- Filter: Start Date -->
      @if (filters.startDate) {
        <div class="mb-4 sm:mb-6">
          <h3 class="text-xs sm:text-sm font-semibold mb-2 sm:mb-3 text-text-muted uppercase tracking-wider flex items-center gap-2">
            <i class="bi bi-calendar-event text-primary"></i>
            Start Year
          </h3>
          <div class="relative">
            <i class="bi bi-calendar3 absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-sm"></i>
            <input
              type="number"
              min="1000"
              max="2025"
              placeholder="e.g. 1931"
              (input)="onFilterChange('startDate', $event)"
              class="w-full pl-9 pr-3 py-2 bg-surface border border-border rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary hover:border-primary transition-colors"
            />
          </div>
        </div>
      }
        <!-- Clear Filters -->
        <button
          (click)="onClearFilters()"
          class="w-full py-2.5 text-sm font-medium text-text hover:text-primary border border-border rounded-lg hover:bg-surface hover:border-primary transition-all duration-300 flex items-center justify-center gap-2 group shadow-sm hover:shadow">
          <i class="bi bi-x-circle group-hover:rotate-90 transition-transform duration-300"></i>
          Clear All Filters
        </button>
      </div>
    </div>
</aside>

<header class="bg-surface-alt shadow-sm">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex items-center justify-between h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/" class="flex items-center space-x-2">
          <div class="text-2xl font-bold text-primary">
            StoneMark<span class="text-info">.</span>
          </div>
        </a>
      </div>

      <!-- Desktop Navigation -->
      <nav class="hidden md:flex items-center space-x-8">
        <a
          *ngFor="let item of menuItems"
          [routerLink]="item.route"
          routerLinkActive="text-primary"
          class="text-text-muted hover:text-primary transition-colors duration-200 font-medium text-sm"
        >
          {{ item.label }}
        </a>
        <button
          class="px-6 py-2 border-2 border-primary text-primary rounded-full hover:bg-primary hover:text-primary-foreground transition-all duration-200 font-medium text-sm"
        >
          Login
        </button>
      </nav>

      <!-- Mobile menu button -->
      <div class="md:hidden">
        <button
          (click)="toggleMenu()"
          class="inline-flex items-center justify-center p-2 rounded-lg text-text-muted hover:text-primary hover:bg-surface-muted transition-colors duration-200"
          [attr.aria-expanded]="isMenuOpen"
        >
          <span class="sr-only">Open main menu</span>
          <!-- Hamburger Icon -->
          <svg
            *ngIf="!isMenuOpen"
            class="block h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M4 6h16M4 12h16M4 18h16"
            />
          </svg>
          <!-- Close Icon -->
          <svg
            *ngIf="isMenuOpen"
            class="block h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M6 18L18 6M6 6l12 12"
            />
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mobile menu -->
  <div
    class="md:hidden transition-all duration-300 ease-in-out"
    [ngClass]="{
      'max-h-96 opacity-100': isMenuOpen,
      'max-h-0 opacity-0 overflow-hidden': !isMenuOpen
    }"
  >
    <div class="px-4 pt-2 pb-6 space-y-1 bg-surface">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="bg-surface-muted text-primary"
        (click)="closeMenu()"
        class="block px-4 py-3 rounded-lg text-text-muted hover:bg-surface-muted hover:text-primary transition-colors duration-200 font-medium"
      >
        {{ item.label }}
      </a>
      <div class="pt-2">
        <button
          class="w-full px-6 py-3 border-2 border-primary text-primary rounded-full hover:bg-primary hover:text-primary-foreground transition-all duration-200 font-medium"
        >
          Login
        </button>
      </div>
    </div>
  </div>
</header>

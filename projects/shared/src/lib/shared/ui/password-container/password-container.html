<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
  <div>
    <!-- Header -->
    <app-password-header [mode]="mode"></app-password-header>

    <!-- Form -->
    <app-password-form
      [mode]="mode"
      [passwordForm]="passwordForm"
      [showCurrentPassword]="showCurrentPassword"
      [showNewPassword]="showNewPassword"
      [showConfirmPassword]="showConfirmPassword"
      [passwordStrength]="passwordStrength"
      [hasMinLength]="hasMinLength"
      [hasUpperCase]="hasUpperCase"
      [hasLowerCase]="hasLowerCase"
      [hasNumber]="hasNumber"
      [hasSpecialChar]="hasSpecialChar"
      [isSubmitting]="isSubmitting"
      (onSubmit)="onSubmit.emit()"
      (toggleCurrentPassword)="toggleCurrentPassword.emit()"
      (toggleNewPassword)="toggleNewPassword.emit()"
      (toggleConfirmPassword)="toggleConfirmPassword.emit()"
      (goBack)="goBack.emit()"
    ></app-password-form>

    <!-- Messages -->
    <app-password-messages
      [mode]="mode"
      [submitSuccess]="submitSuccess"
      [submitError]="submitError"
      [errorMessage]="errorMessage"
    ></app-password-messages>

    <!-- Help -->
    <app-password-help [mode]="mode"></app-password-help>
  </div>
</div>

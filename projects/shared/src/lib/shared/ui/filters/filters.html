<div class="bg-surface-alt border border-border rounded-xl p-4 mb-6">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">

    <!-- Sort Buttons -->
    <div class="flex items-center gap-3">
      <span class="text-xs font-semibold text-text-muted uppercase tracking-wider">Sort by</span>
      <div class="inline-flex border border-border rounded-lg overflow-hidden bg-surface">
        <button
          type="button"
          class="px-4 py-2 text-sm font-medium focus:outline-none transition-all duration-200 border-r border-border"
          [ngClass]="sortOrder === 'desc'
          ? 'bg-primary text-white shadow-sm'
          : 'bg-surface text-text hover:bg-surface-alt'"
          (click)="onSortChange('desc')">
          <i class="bi bi-sort-down mr-1.5"></i>
          Recent
        </button>
        <button
          type="button"
          class="px-4 py-2 text-sm font-medium focus:outline-none transition-all duration-200"
          [ngClass]="sortOrder === 'asc'
          ? 'bg-primary text-white shadow-sm'
          : 'bg-surface text-text hover:bg-surface-alt'"
          (click)="onSortChange('asc')">
          <i class="bi bi-sort-up mr-1.5"></i>
          Older
        </button>
      </div>
    </div>

    <!-- Filter Dropdown -->
    <div class="flex items-center gap-3">
      <div class="w-full sm:w-64">
        <label class="text-xs font-semibold text-text-muted uppercase tracking-wider mb-1.5 flex items-center">
          @if (filterIconHtml) {
            <span class="mr-1.5 flex items-center text-lg" [innerHTML]="filterIconHtml | safeHtml"></span>
          } @else {
            <i [class]="'bi ' + filterIcon + ' mr-1.5'"></i>
          }
          {{ filterLabel }}
        </label>
        <app-shared-select
          [options]="filterOptions"
          [selected]="selectedFilterValue"
          [label]="filterPlaceholder"
          [searchable]="true"
          [optionLabelKey]="optionLabelKey"
          [optionValueKey]="optionValueKey"
          (selectionChange)="onFilterChange($event)">
        </app-shared-select>
      </div>

      @if (selectedFilterValue) {
        <button
          (click)="onFilterChange('')"
          class="px-3 py-4 text-xs text-error hover:bg-error/10 transition-all duration-200 font-medium flex items-center gap-1.5 rounded-lg border border-error/20 hover:border-error/40"
          title="Clear filter">
          <i class="bi bi-x-circle"></i>
          <span>Clear</span>
        </button>
      }
    </div>
  </div>
</div>

<div class="min-h-screen bg-surface">

  <app-bookmarks-header-section
    [rangeStart]="(currentPage - 1) * itemsPerPage + 1"
    [rangeEnd]="Math.min(currentPage * itemsPerPage, filteredItems.length)"
    [total]="filteredItems.length"
    title="Bookmarks">
  </app-bookmarks-header-section>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">

    <app-bookmarks-tabs-section
      [activeTab]="activeTab"
      [tabs]="[
        { type: 'all', label: 'All', count: monuments.length + marks.length },
        { type: 'monuments', label: 'Monuments', count: monuments.length },
        { type: 'marks', label: 'Marks', count: marks.length }
      ]"
      (tabChange)="changeTab($event)">
    </app-bookmarks-tabs-section>

    @if (filteredItems.length === 0) {
      <app-bookmarks-empty-state-section></app-bookmarks-empty-state-section>
    }

    @if (paginatedItems.length > 0) {
      <app-bookmarks-grid-section
        [items]="paginatedItems"
        (remove)="removeBookmark($event.bookmarkId, $event.type)"
        (viewDetails)="viewDetails($event)">
      </app-bookmarks-grid-section>
    }

    @if (totalPages > 1) {
      <app-bookmarks-pagination-section
        [currentPage]="currentPage"
        [totalPages]="totalPages"
        [pageNumbers]="getPageNumbers()"
        (goToPage)="goToPage($event)"
        (previousPage)="previousPage()"
        (nextPage)="nextPage()">
      </app-bookmarks-pagination-section>
    }

  </div>
</div>

<div class="min-h-screen bg-surface">
  <div class="max-w-4xl mx-auto px-6 py-12">
    <!-- Breadcrumb -->
    <app-breadcrumb-profile currentPage="Change Password" />

    <div class="flex items-center justify-center">
      <app-password-container
        mode="change"
        [passwordForm]="passwordForm"
        [showCurrentPassword]="showCurrentPassword"
        [showNewPassword]="showNewPassword"
        [showConfirmPassword]="showConfirmPassword"
        [passwordStrength]="passwordStrength"
        [hasMinLength]="hasMinLength"
        [hasUpperCase]="hasUpperCase"
        [hasLowerCase]="hasLowerCase"
        [hasNumber]="hasNumber"
        [hasSpecialChar]="hasSpecialChar"
        [isSubmitting]="isSubmitting"
        [submitError]="submitError"
        [errorMessage]="errorMessage"
        (onSubmit)="onSubmit()"
        (toggleCurrentPassword)="showCurrentPassword = !showCurrentPassword"
        (toggleNewPassword)="showNewPassword = !showNewPassword"
        (toggleConfirmPassword)="showConfirmPassword = !showConfirmPassword"
        (goBack)="goBack()">
      </app-password-container>
    </div>
  </div>
</div>

<section id="opensource-contribution" class="py-24 px-6 bg-surface border-t border-border">
  <div class="max-w-5xl mx-auto text-center">
    <h2 class="text-4xl md:text-5xl font-serif mb-4">
      {{ 'discover-contribution-section.title' | translate }}
    </h2>
    <p class="text-text-muted mb-12 max-w-3xl mx-auto">
      {{ 'discover-contribution-section.desc' | translate }}
    </p>

    <div class="flex flex-col md:flex-row gap-4 justify-center mb-16">
      <app-button
        variant="primary"
        size="normal"
        [routerLink]="'repo/frontend'"
      >
        {{ 'discover-contribution-section.frontend' | translate }}
      </app-button>
      <app-button
        variant="secondary"
        size="normal"
        [routerLink]="'repo/backend'"
      >
        {{ 'discover-contribution-section.backend' | translate }}
      </app-button>
    </div>

    <p class="text-text-muted italic">
      {{ 'discover-contribution-section.footer' | translate }}
    </p>
  </div>
</section>

<header
  class="fixed top-0 left-0 right-0 z-50 px-4 sm:px-6 lg:px-8 pt-6 transition-transform duration-300 ease-in-out"
  [class.-translate-y-full]="!isHeaderVisible"
>
  <div class="max-w-7xl mx-auto">
    <div class="bg-white/80 backdrop-blur-xl border border-border rounded-full shadow-lg px-6 py-3">
      <div class="flex items-center justify-between gap-8">

        <!-- Logo -->
        <div
          (click)="onHome()"
          class="flex items-center cursor-pointer select-none shrink-0"
          aria-label="StoneMark"
        >
          <img
            src="assets/stonemark-big-logo.png"
            alt="StoneMark"
            class="h-10 w-auto"
          />
        </div>

        <!-- Desktop Navigation -->
        <nav class="hidden lg:flex items-center gap-1">
          @for (item of menuItems; track item.route) {
            <a
              [href]="item.route"
              class="px-4 py-2 text-sm font-medium transition-colors rounded-full hover:text-text hover:bg-surface-alt/50"
              [class.text-text]="isActiveRoute(item.route)"
              [class.bg-surface-alt]="isActiveRoute(item.route)"
              [class.text-text-muted]="!isActiveRoute(item.route)"
            >
              {{ item.label }}
            </a>
          }
        </nav>

        <!-- User Section -->
        <div class="hidden lg:flex items-center gap-3 shrink-0">
          <!-- Language Selector -->
          <app-language-selector></app-language-selector>

          @if (!isAuthLoading) {
            @if (user) {
              <div class="relative">
                <button
                  (click)="toggleDropdown()"
                  class="p-1 hover:bg-surface-alt/50 rounded-full transition-all duration-200"
                >
                  <div class="w-9 h-9 rounded-full bg-surface-alt border border-border/50 flex items-center justify-center
                              hover:border-primary/30 transition-all duration-200 group">
                    <i class="bi bi-person text-text-muted group-hover:text-primary text-base transition-colors"></i>
                  </div>
                </button>

                <!-- Dropdown -->
                @if (isDropdownOpen) {
                  <div class="absolute right-0 mt-2 w-48 bg-white/95 backdrop-blur-xl border border-border
                              rounded-2xl shadow-xl py-2 animate-in fade-in slide-in-from-top-2 duration-200">
                    <button
                      (click)="goToProfile()"
                      class="w-full text-left px-4 py-2.5 text-sm text-text-muted hover:text-text
                             hover:bg-surface-alt transition-colors flex items-center gap-3 cursor-pointer"
                    >
                      <i class="bi bi-person-circle"></i>
                      <span>Profile</span>
                    </button>
                    <button
                      (click)="goToBookmarks()"
                      class="w-full text-left px-4 py-2.5 text-sm text-text-muted hover:text-text
                             hover:bg-surface-alt transition-colors flex items-center gap-3 cursor-pointer"
                    >
                      <i class="bi bi-bookmark"></i>
                      <span>Bookmarks</span>
                    </button>
                    <div class="h-px bg-border my-2"></div>
                    <button
                      (click)="onLogout()"
                      class="w-full text-left px-4 py-2.5 text-sm text-error hover:bg-error/10
                             transition-colors flex items-center gap-3 cursor-pointer"
                    >
                      <i class="bi bi-box-arrow-right"></i>
                      <span>Logout</span>
                    </button>
                  </div>
                }
              </div>
            } @else {
              <app-button
                (click)="onLogin()"
                variant="primary"
                size="sm"
                class="px-6 py-2 rounded-full"
              >
                <i class="bi bi-box-arrow-in-right"></i>
                Sign In
              </app-button>
            }
          }
        </div>

        <!-- Mobile Menu Button -->
        <button
          (click)="toggleMenu()"
          class="lg:hidden p-2 text-text-muted hover:text-text rounded-full
                 hover:bg-surface-alt transition-colors"
          [attr.aria-expanded]="isMenuOpen"
        >
          @if (!isMenuOpen) {
            <i class="bi bi-list text-2xl"></i>
          } @else {
            <i class="bi bi-x-lg text-xl"></i>
          }
        </button>
      </div>
    </div>
  </div>
</header>

<!-- Mobile Menu -->
@if (isMenuOpen) {
  <div class="fixed inset-0 z-40 lg:hidden">
    <!-- Backdrop -->
    <div
      class="absolute inset-0 bg-black/20 backdrop-blur-sm animate-in fade-in duration-200"
      (click)="closeMenu()"
    ></div>

    <!-- Menu Panel -->
    <div class="absolute top-24 left-4 right-4 bg-white/95 backdrop-blur-xl border border-border
                rounded-3xl shadow-2xl p-6 animate-in slide-in-from-top-4 duration-300">

      <!-- Navigation Links -->
      <nav class="space-y-1 mb-6">
        @for (item of menuItems; track item.route) {
          <a
            [href]="item.route"
            (click)="closeMenu()"
            class="block px-4 py-3 text-sm font-medium rounded-xl transition-colors"
            [class.text-text]="isActiveRoute(item.route)"
            [class.bg-surface-alt]="isActiveRoute(item.route)"
            [class.text-text-muted]="!isActiveRoute(item.route)"
            [class.hover:bg-surface-alt]="!isActiveRoute(item.route)"
          >
            {{ item.label }}
          </a>
        }
      </nav>

      <!-- Language Selector -->
      <div class="flex justify-center mb-6">
        <app-language-selector></app-language-selector>
      </div>

      @if (!isAuthLoading) {
        @if (user) {
          <!-- User Actions -->
          <div class="pt-4 border-t border-border space-y-1 mb-6">
            <button
              (click)="closeMenu(); goToProfile()"
              class="w-full text-left px-4 py-3 text-sm font-medium text-text-muted
                     hover:text-text hover:bg-surface-alt rounded-xl transition-colors
                     flex items-center gap-3"
            >
              <i class="bi bi-person-circle"></i>
              <span>Profile</span>
            </button>
            <button
              (click)="closeMenu(); goToBookmarks()"
              class="w-full text-left px-4 py-3 text-sm font-medium text-text-muted
                     hover:text-text hover:bg-surface-alt rounded-xl transition-colors
                     flex items-center gap-3"
            >
              <i class="bi bi-bookmark"></i>
              <span>Bookmarks</span>
            </button>
          </div>

          <!-- Logout -->
          <app-button
            (click)="onLogout()"
            variant="danger"
            size="lg"
            [fullWidth]="true"
            class="px-4 py-3 rounded-xl font-medium text-sm flex items-center justify-center gap-2"
          >
            <i class="bi bi-box-arrow-right"></i>
            <span>Logout</span>
          </app-button>
        } @else {
          <!-- Sign In -->
          <app-button
            (click)="onLogin()"
            [fullWidth]="true"
            variant="primary"
            size="lg"
            class="w-full px-6 py-3 rounded-xl font-medium"
          >
            <i class="bi bi-box-arrow-in-right"></i>
            Sign In
          </app-button>
        }
      }
    </div>
  </div>
}

<div class="h-24"></div>

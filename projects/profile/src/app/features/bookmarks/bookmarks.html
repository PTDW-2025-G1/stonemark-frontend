<div class="min-h-screen bg-surface">

  <!-- Header -->
  <app-bookmarks-header-section
    [rangeStart]="(facade.pagination.currentPage - 1) * facade.pagination.itemsPerPage + 1"
    [rangeEnd]="Math.min(
      facade.pagination.currentPage * facade.pagination.itemsPerPage,
      facade.filteredItems.length
    )"
    [total]="facade.filteredItems.length"
    title="Bookmarks"
    subtitle="Your saved monuments and marks collection">
  </app-bookmarks-header-section>

  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">

    <!-- Tabs -->
    <app-bookmarks-tabs-section
      [activeTab]="facade.activeTab"
      [tabs]="[
        { type: 'all', label: 'All', count: facade.monuments.length + facade.marks.length },
        { type: 'monuments', label: 'Monuments', count: facade.monuments.length },
        { type: 'marks', label: 'Marks', count: facade.marks.length }
      ]"
      (tabChange)="changeTab($event)">
    </app-bookmarks-tabs-section>

    <!-- Empty -->
    @if (facade.filteredItems.length === 0) {
      <app-bookmarks-empty-state-section></app-bookmarks-empty-state-section>
    }

    <!-- Grid -->
    @if (facade.pagination.paginatedItems.length > 0) {
      <app-bookmarks-grid-section
        [items]="facade.pagination.paginatedItems"
        (remove)="removeBookmark($event)"
        (viewDetails)="viewDetails($event)">
      </app-bookmarks-grid-section>
    }

    <!-- Pagination -->
    @if (facade.pagination.totalPages > 1) {
      <app-pagination
        [currentPage]="facade.pagination.currentPage"
        [totalPages]="facade.pagination.totalPages"
        (pageChange)="onPageChange($event)">
      </app-pagination>
    }

  </div>
</div>

<section class="relative bg-gradient-to-br from-primary via-primary to-black text-primary-foreground overflow-hidden">
  <div class="absolute inset-0 opacity-10">
    <div class="absolute inset-0" style="background-image: url('data:image/svg+xml,%3Csvg width=\'60\' height=\'60\' viewBox=\'0 0 60 60\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cpath d=\'M30 0l30 30-30 30L0 30z\' fill=\'%23fff\' fill-opacity=\'0.1\'/%3E%3C/svg%3E');"></div>
  </div>
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 sm:py-12">
    <div class="flex flex-col md:flex-row items-center md:items-start gap-8 md:gap-12">
      <!-- Avatar -->
      <div class="relative group flex-shrink-0">
        <div class="w-32 h-32 sm:w-40 sm:h-40 rounded-2xl overflow-hidden border-4 border-white/20 shadow-2xl backdrop-blur-sm group-hover:border-white/40 transition-all">
          <img
            [src]="user.avatar"
            [alt]="user.name"
            class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500"
          />
        </div>
        <button class="absolute -bottom-3 -right-3 w-11 h-11 bg-white text-primary rounded-xl flex items-center justify-center shadow-lg hover:scale-110 transition-transform">
          <i class="bi bi-camera text-base"></i>
        </button>
      </div>

      <!-- Info -->
      <div class="flex-1 text-center md:text-left md:ml-8">
        <h1 class="text-2xl sm:text-3xl font-serif font-bold mb-1">
          {{ user.name }}
        </h1>
        <a
          [href]="'mailto:' + user.email"
          class="text-sm text-white/90 hover:text-white transition-colors inline-flex items-center gap-2 mb-2">
          <i class="bi bi-envelope text-xs"></i>
          {{ user.email }}
        </a>
        <p class="text-xs text-white/80 flex items-center justify-center md:justify-start gap-2 mb-6">
          <i class="bi bi-calendar-check"></i>
          Member since {{ user.memberSince }}
        </p>

        <!-- Compact Stats -->
        <div class="inline-flex items-center gap-2 bg-black/20 backdrop-blur-sm rounded-full px-4 py-2 border border-white/10">
          <div class="flex items-center gap-1.5 px-3 py-1 bg-blue-500/20 rounded-full border border-blue-400/30">
            <i class="bi bi-star-fill text-xs text-blue-300"></i>
            <span class="text-sm font-bold">{{ user.stats.totalMarks + " Marks" }}</span>
          </div>
          <div class="w-px h-4 bg-white/20"></div>
          <div class="flex items-center gap-1.5 px-3 py-1 bg-amber-500/20 rounded-full border border-amber-400/30">
            <i class="bi bi-clock-fill text-xs text-amber-300"></i>
            <span class="text-sm font-bold">{{ user.stats.pendings + " Pending" }}</span>
          </div>
          <div class="w-px h-4 bg-white/20"></div>
          <div class="flex items-center gap-1.5 px-3 py-1 bg-rose-500/20 rounded-full border border-rose-400/30">
            <i class="bi bi-x-circle-fill text-xs text-rose-300"></i>
            <span class="text-sm font-bold">{{ user.stats.rejected + " Rejected"}}</span>
          </div>
        </div>
      </div>

      <!-- Action Buttons -->
      <div class="flex md:flex-col gap-2 flex-shrink-0">
        <button class="px-4 py-2 bg-white text-primary rounded-lg font-semibold hover:shadow-xl transition-all hover:scale-105 flex items-center gap-2 text-sm"
                (click)="editProfile.emit()">
          <i class="bi bi-pencil text-xs"></i>
          <span class="hidden sm:inline">Edit Profile</span>
        </button>
        <button
          class="px-4 py-2 bg-white text-primary rounded-lg font-semibold hover:shadow-xl transition-all hover:scale-105 flex items-center gap-2 text-sm"
          (click)="changePassword.emit()">
          <i class="bi bi-lock-fill text-xs"></i>
          <span class="hidden sm:inline">Change Password</span>
        </button>
        <button
          class="px-4 py-2 bg-white text-primary rounded-lg font-semibold hover:shadow-xl transition-all hover:scale-105 flex items-center gap-2 text-sm"
          (click)="changeEmail.emit()">
          <i class="bi bi-envelope-fill text-xs"></i>
          <span class="hidden sm:inline">Change Email</span>
        </button>
        <button class="px-4 py-2 bg-error text-white rounded-lg font-semibold hover:bg-error/90 transition-all flex items-center gap-2 text-sm"
                (click)="logout.emit()">
          <i class="bi bi-box-arrow-right text-xs"></i>
          <span class="hidden sm:inline">Logout</span>
        </button>
      </div>
    </div>
  </div>
</section>

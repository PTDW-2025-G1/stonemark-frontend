<nav
  class="flex flex-col sm:flex-row items-center justify-center gap-3 sm:gap-4 mt-10 sm:mt-12"
  aria-label="Pagination"
>
  <!-- Previous -->
  <button
    (click)="onPageChange(currentPage - 1)"
    [disabled]="currentPage === 1"
    class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-4 py-2.5 sm:py-2 border border-border rounded-lg transition-colors text-sm font-medium cursor-pointer"
    [class.opacity-60]="currentPage === 1"
    [class.cursor-not-allowed]="currentPage === 1"
    [class.hover\:bg-surface-alt]="currentPage > 1"
  >
    <i class="bi bi-arrow-left"></i>
    <span>Previous</span>
  </button>

  <!-- Pages -->
  <div class="flex items-center gap-1 sm:gap-2">
    <!-- First page -->
    <button
      (click)="onPageChange(1)"
      class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg font-medium text-sm transition-colors cursor-pointer"
      [class.bg-primary]="currentPage === 1"
      [class.text-primary-foreground]="currentPage === 1"
      [class.border]="currentPage !== 1"
      [class.border-border]="currentPage !== 1"
      [class.hover\:bg-surface-alt]="currentPage !== 1"
    >
      1
    </button>

    <!-- Ellipsis before -->
    @if (currentPage > 3) {
      <span class="px-2 text-text-muted text-sm select-none">...</span>
    }

    <!-- Middle pages -->
    @for (page of [currentPage - 1, currentPage, currentPage + 1]; track page) {
      @if (page > 1 && page < totalPages) {
        <button
          (click)="onPageChange(page)"
          class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg font-medium text-sm transition-colors cursor-pointer"
          [class.bg-primary]="currentPage === page"
          [class.text-primary-foreground]="currentPage === page"
          [class.border]="currentPage !== page"
          [class.border-border]="currentPage !== page"
          [class.hover\:bg-surface-alt]="currentPage !== page"
        >
          {{ page }}
        </button>
      }
    }

    <!-- Ellipsis after -->
    @if (currentPage < totalPages - 2) {
      <span class="px-2 text-text-muted text-sm select-none">...</span>
    }

    <!-- Last page -->
    @if (totalPages > 1) {
      <button
        (click)="onPageChange(totalPages)"
        class="w-9 h-9 sm:w-10 sm:h-10 flex items-center justify-center rounded-lg font-medium text-sm transition-colors cursor-pointer"
        [class.bg-primary]="currentPage === totalPages"
        [class.text-primary-foreground]="currentPage === totalPages"
        [class.border]="currentPage !== totalPages"
        [class.border-border]="currentPage !== totalPages"
        [class.hover\:bg-surface-alt]="currentPage !== totalPages"
      >
        {{ totalPages }}
      </button>
    }
  </div>

  <!-- Next -->
  <button
    (click)="onPageChange(currentPage + 1)"
    [disabled]="currentPage === totalPages"
    class="w-full sm:w-auto inline-flex items-center justify-center gap-2 px-4 py-2.5 sm:py-2 border border-border rounded-lg transition-colors text-sm font-medium"
    [class.opacity-60]="currentPage === totalPages"
    [class.cursor-not-allowed]="currentPage === totalPages"
    [class.hover\:bg-surface-alt]="currentPage < totalPages"
  >
    <span>Next</span>
    <i class="bi bi-arrow-right"></i>
  </button>
</nav>

<section class="mb-16 sm:mb-20 lg:mb-24">
  <h2
    class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-text mb-8 sm:mb-12"
  >
    Monument Details
  </h2>

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 sm:gap-8">

    @if (monument.artist_name) {
      <!-- Artist Card -->
      <div
        class="group relative overflow-hidden bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 sm:p-8 border border-border hover:border-primary/50 transition-all duration-300 hover:shadow-xl"
      >
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -translate-y-16 translate-x-16 group-hover:scale-150 transition-transform duration-500"
        ></div>
        <div class="relative">
          <div
            class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300"
          >
            <i class="bi bi-palette-fill text-primary text-2xl"></i>
          </div>
          <p class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-2">
            Artist
          </p>
          <p class="text-xl sm:text-2xl font-semibold text-text">
            {{ monument.artist_name }}
          </p>
        </div>
      </div>
    }

    @if (monument.architect) {
      <!-- Architect Card -->
      <div
        class="group relative overflow-hidden bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 sm:p-8 border border-border hover:border-primary/50 transition-all duration-300 hover:shadow-xl"
      >
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -translate-y-16 translate-x-16 group-hover:scale-150 transition-transform duration-500"
        ></div>
        <div class="relative">
          <div
            class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300"
          >
            <i class="bi bi-rulers text-primary text-2xl"></i>
          </div>
          <p class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-2">
            Architect
          </p>
          <p class="text-xl sm:text-2xl font-semibold text-text">
            {{ monument.architect }}
          </p>
        </div>
      </div>
    }

    @if (monument.material) {
      <!-- Material Card -->
      <div
        class="group relative overflow-hidden bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 sm:p-8 border border-border hover:border-primary/50 transition-all duration-300 hover:shadow-xl"
      >
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -translate-y-16 translate-x-16 group-hover:scale-150 transition-transform duration-500"
        ></div>
        <div class="relative">
          <div
            class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300"
          >
            <i class="bi bi-gem text-primary text-2xl"></i>
          </div>
          <p class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-2">
            Material
          </p>
          <p class="text-xl sm:text-2xl font-semibold text-text capitalize">
            {{ monument.material }}
          </p>
        </div>
      </div>
    }

    @if (monument.start_date) {
      <!-- Construction Date Card -->
      <div
        class="group relative overflow-hidden bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 sm:p-8 border border-border hover:border-primary/50 transition-all duration-300 hover:shadow-xl"
      >
        <div
          class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -translate-y-16 translate-x-16 group-hover:scale-150 transition-transform duration-500"
        ></div>
        <div class="relative">
          <div
            class="w-14 h-14 bg-primary/10 rounded-2xl flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300"
          >
            <i class="bi bi-calendar-event text-primary text-2xl"></i>
          </div>
          <p class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-2">
            Construction Started
          </p>
          <p class="text-xl sm:text-2xl font-semibold text-text">
            {{ monument.start_date }}
          </p>
        </div>
      </div>
    }

  </div>
</section>

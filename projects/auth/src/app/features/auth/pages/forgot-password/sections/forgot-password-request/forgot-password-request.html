<form [formGroup]="form" (ngSubmit)="submit.emit()" class="text-left">
  <div class="mb-6">
    <label for="email" class="block text-sm font-semibold text-text mb-2">
      Email Address <span class="text-error">*</span>
    </label>
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
        <i class="bi bi-envelope text-text-muted"></i>
      </div>
      <input
        type="email"
        id="email"
        formControlName="email"
        placeholder="your@email.com"
        class="w-full pl-11 pr-4 py-3 bg-surface border-2 border-border rounded-xl focus:outline-none focus:ring-2 focus:ring-info/20 focus:border-primary transition-all duration-300"
        [class.border-error]="form.get('email')?.invalid && form.get('email')?.touched"
      />
    </div>
    @if (emailError) {
      <p class="mt-2 text-sm text-error flex items-center gap-1">
        <i class="bi bi-exclamation-circle"></i>
        {{ emailError }}
      </p>
    }
  </div>

  <button
    type="submit"
    [disabled]="form.invalid || loading"
    class="w-full group relative overflow-hidden px-6 py-3.5 bg-primary text-white rounded-xl font-semibold hover:shadow-lg transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:shadow-none mb-6">
    <div class="absolute inset-0 bg-gradient-to-r from-primary/80 to-info/80 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    <span class="relative flex items-center justify-center gap-2">
      @if (loading) { <i class="bi bi-hourglass-split animate-spin"></i> Sending... }
      @else { <i class="bi bi-send"></i> Send Reset Link }
    </span>
  </button>

  <a
    routerLink="/login"
    class="w-full flex items-center justify-center gap-2 px-6 py-3 bg-surface-alt border-2 border-border text-text rounded-xl font-semibold hover:border-primary transition-all duration-300">
    <i class="bi bi-arrow-left"></i>
    Back to Login
  </a>
</form>

<section class="mb-16 sm:mb-20 lg:mb-24">
  <div class="max-w-3xl">
    <h2
      class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-text mb-6 sm:mb-8"
    >
      About this Monument
    </h2>

    @if (monument.description) {
      <p
        class="text-base sm:text-lg lg:text-xl text-text-muted leading-relaxed"
      >
        {{ monument.description }}
      </p>
    } @else {
      <p class="text-text-muted italic text-base sm:text-lg">
        No detailed description available for this monument yet.
      </p>
    }
  </div>
</section>

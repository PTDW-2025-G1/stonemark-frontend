<section class="py-16 px-4">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12 sm:py-16 lg:py-8 space-y-12">
    <!-- Hero Header -->
    <app-legal-hero-header
      [title]="'cookies_policy.title' | translate"
      [lastUpdated]="'cookies_policy.last_updated' | translate"
    />
    <!-- Sections Grid -->
    <article class="flex flex-col gap-6" aria-label="Cookie Policy sections">
      <!-- Introduction -->
      <app-legal-section-block
        [title]="'cookies_policy.introduction.title' | translate"
        [paragraphs]="[
          ('cookies_policy.introduction.p1' | translate),
          ('cookies_policy.introduction.p2' | translate)
        ]"
      />
      <!-- What Are Cookies -->
      <app-legal-section-block
        [title]="'cookies_policy.what_are_cookies.title' | translate"
        [paragraphs]="[
          ('cookies_policy.what_are_cookies.p1' | translate),
          ('cookies_policy.what_are_cookies.p2' | translate)
        ]"
      />
      <!-- Types of Cookies We Use -->
      <app-types-of-cookies-section></app-types-of-cookies-section>
      <!-- Third-Party Cookies -->
      <app-third-party-cookies-section></app-third-party-cookies-section>
      <!-- Managing Your Cookie Preferences -->
      <app-managing-cookie-preferences-section></app-managing-cookie-preferences-section>
      <!-- Cookie Retention -->
      <app-cookie-retention-section></app-cookie-retention-section>
      <!-- Updates to This Policy -->
      <app-legal-section-block
        [title]="'cookies_policy.updates.title' | translate"
        [paragraphs]="[
          ('cookies_policy.updates.desc' | translate)
        ]"
      />
      <!-- Contact -->
      <app-questions-about-cookies-section></app-questions-about-cookies-section>
    </article>
  </div>
</section>

<section>
  <h2 class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-text mb-6 sm:mb-8">
    Explore
  </h2>

  <div class="space-y-4">
    <app-action-button
      [title]="'See Marks'"
      [subtitle]="'View ' + stats.marks + ' stone marks'"
      [iconClass]="'bi bi-eye text-2xl'"
      [buttonClass]="'w-full group relative overflow-hidden bg-primary text-primary-foreground rounded-2xl p-6 hover:shadow-2xl transition-all duration-300 hover:-translate-y-1'"
      [iconBgClass]="'w-12 h-12 bg-white/20 rounded-xl flex items-center justify-center'"
      [gradientClass]="'absolute inset-0 bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-700'"
      [onClick]="onSeeMarks"
    />
    <app-action-button
      [title]="'Capture Mark'"
      [subtitle]="'Add new discovery'"
      [iconClass]="'bi bi-camera text-primary text-2xl'"
      [buttonClass]="'w-full group relative overflow-hidden bg-surface-alt border-2 border-border text-text rounded-2xl p-6 hover:border-primary hover:shadow-xl transition-all duration-300 hover:-translate-y-1'"
      [iconBgClass]="'w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center'"
      [subtitleClass]="'text-text-muted'"
      [onClick]="onCaptureMark"
    />
    <app-action-button
      [title]="'Submit a Correction'"
      [subtitle]="'Suggest a change or addition'"
      [iconClass]="'bi bi-flag text-primary text-2xl'"
      [buttonClass]="'w-full group relative overflow-hidden bg-surface-alt border-2 border-border text-text rounded-2xl p-6 hover:border-primary hover:shadow-xl transition-all duration-300 hover:-translate-y-1'"
      [iconBgClass]="'w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center'"
      [subtitleClass]="'text-text-muted'"
      [onClick]="onSubmitCorrection"
    />
  </div>


  <!-- Stats Card -->
    <div
      class="bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 border border-border mt-6"
    >
      <p
        class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-4"
      >
        Monument Stats
      </p>

      <div class="space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-sm text-text flex items-center gap-2">
            <i class="bi bi-eye-fill text-primary"></i>
            Stone Marks
          </span>
          <span class="font-semibold text-text">{{ stats.marks }}</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-sm text-text flex items-center gap-2">
            <i class="bi bi-people-fill text-primary"></i>
            Guilds Active
          </span>
          <span class="font-semibold text-text">{{ stats.guilds }}</span>
        </div>

        <div class="flex items-center justify-between">
          <span class="text-sm text-text flex items-center gap-2">
            <i class="bi bi-camera-fill text-primary"></i>
            Contributions
          </span>
          <span class="font-semibold text-text">{{ stats.contributions }}</span>
        </div>
      </div>
    </div>
</section>

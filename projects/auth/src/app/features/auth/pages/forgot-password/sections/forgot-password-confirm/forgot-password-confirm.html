<form [formGroup]="form" (ngSubmit)="submit.emit()" class="text-left">
  <label for="code" class="block text-sm font-semibold text-text mb-2">
    Confirmation Code
  </label>
  <input
    id="code"
    type="text"
    formControlName="code"
    maxlength="6"
    class="w-full text-center text-xl font-mono tracking-widest uppercase bg-surface border-2 border-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
    placeholder="ABC123"
  />
  @if (error) {
    <p class="mt-2 text-sm text-error flex items-center gap-1">
      <i class="bi bi-exclamation-circle"></i> {{ error }}
    </p>
  }

  <button
    type="submit"
    [disabled]="form.invalid || loading"
    class="mt-4 w-full group relative overflow-hidden px-6 py-3.5 bg-primary text-white rounded-xl font-semibold hover:shadow-lg transition-all duration-300 disabled:opacity-50">
    <div class="absolute inset-0 bg-gradient-to-r from-primary/80 to-info/80 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
    <span class="relative flex items-center justify-center gap-2">
      @if (loading) { <i class="bi bi-hourglass-split animate-spin"></i> Verifying... }
      @else { <i class="bi bi-shield-check"></i> Confirm Code }
    </span>
  </button>
</form>

<div class="min-h-screen bg-surface py-12 px-4 sm:px-6 lg:px-8">
  <div class="max-w-4xl mx-auto">
    <app-accessibility-header-section></app-accessibility-header-section>
    <app-accessibility-quick-reset-section
      (reset)="resetSettings()">
    </app-accessibility-quick-reset-section>
    <app-accessibility-settings-section
      [categorizedSettings]="categorizedSettings"
      (toggle)="toggleSetting($event)">
    </app-accessibility-settings-section>
    <app-accessibility-support-section></app-accessibility-support-section>
  </div>
</div>

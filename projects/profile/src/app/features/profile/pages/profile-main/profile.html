<app-profile-header
  [user]="user"
  (editProfile)="editProfile()"
  (changePassword)="changePassword()"
  (openSecurity)="openSecurity()"
  (openContacts)="openContacts()"
  (openSocial)="openSocial()"
  (goToStaff)="goToStaff()"
  (logout)="onLogout()"
></app-profile-header>
<app-profile-tabs
  [activeTab]="activeTab"
  (tabChange)="setTab($event)"
></app-profile-tabs>
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  @if (activeTab === 'marks') {
    <app-profile-marks
      [occurrences]="occurrences"
      (addOccurrence)="onAddMark()"
      (editOccurrence)="onEditMark($event)"
      (removeOccurrence)="onRemoveMark($event)"
      (viewOccurrence)="onViewMark($event)"
    ></app-profile-marks>
  }
  @if (activeTab === 'suggestions') {
    <app-profile-suggestions
      [suggestions]="suggestions"
      [suggestionFilter]="suggestionFilter"
      [getFilteredSuggestions]="getFilteredSuggestions.bind(this)"
      [getFilteredCount]="getFilteredCount.bind(this)"
      (createSuggestion)="onCreateSuggestion()"
      (editSuggestion)="onEditSuggestion($event)"
      (viewSuggestion)="onViewSuggestion($event)"
      (filterChange)="onSuggestionFilterChange($event)">
    </app-profile-suggestions>
  }
  </div>

<section class="mb-16 sm:mb-20 lg:mb-24">
  <h2 class="text-2xl sm:text-3xl lg:text-4xl font-semibold text-text mb-6 sm:mb-8">
    Location
  </h2>

  <!-- Info Card -->
  <div
    class="bg-gradient-to-br from-surface-alt to-surface rounded-2xl p-6 sm:p-8 border border-border mb-6"
  >
    <div class="flex items-start gap-4">
      <div
        class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0"
      >
        <i class="bi bi-pin-map-fill text-primary text-xl"></i>
      </div>
      <div>
        <p
          class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-1"
        >
          Address
        </p>
        <p class="text-lg text-text font-medium">
          {{ monument.location }}
        </p>
      </div>
    </div>

    @if (monument.lat && monument.lon) {
      <div class="flex items-start gap-4 mt-4">
        <div
          class="w-12 h-12 bg-primary/10 rounded-xl flex items-center justify-center flex-shrink-0"
        >
          <i class="bi bi-globe text-primary text-xl"></i>
        </div>
        <div>
          <p
            class="text-sm text-text-muted uppercase tracking-wider font-semibold mb-1"
          >
            Coordinates
          </p>
          <p class="text-sm text-text font-mono">
            {{ monument.lat }}, {{ monument.lon }}
          </p>
        </div>
      </div>
    }
  </div>

  <!-- Google Maps Embed -->
  @if (mapUrl) {
    <div
      class="relative aspect-[16/9] w-full bg-surface-muted rounded-2xl overflow-hidden border border-border mb-4"
    >
      <iframe
        width="100%"
        height="100%"
        frameborder="0"
        style="border:0; min-height:350px;"
        [src]="mapUrl"
        allowfullscreen
      ></iframe>

      <button
        class="absolute top-4 right-4 bg-primary text-primary-foreground rounded-xl px-6 py-3 font-semibold hover:bg-primary/80 transition shadow-lg"
        [attr.aria-label]="'View Directions for ' + monument.name"
        (click)="openDirections(monument.lat!, monument.lon!)"
      >
        View Directions
      </button>
    </div>
  }
</section>
